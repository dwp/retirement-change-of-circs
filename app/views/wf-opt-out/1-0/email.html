{% extends "layouts/ol_signed_in.html" %}

{% block pageTitle %}
  Do you own the account? - Manage your State Pension - GOV.UK
{% endblock %}

{% block content %}

 <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">
 <h1 class="govuk-heading-l">
        What is your email address?
      </h1>

<div class="govuk-form-group">
  <form class="form" action="/wf-opt-out/1-0/email" method="post">
  <label class="govuk-label" for="email">
    Email address
  </label>
  <div id="email-hint" class="govuk-hint">
   We’ll only use this to send you Winter Fuel notifications.
  </div>
  <input class="govuk-input" id="email" name="email" type="email" spellcheck="false" aria-describedby="email-hint" autocomplete="email">

</div>

  <button type="submit" class="govuk-button" data-module="govuk-button">
  Continue
</button>
</form>



{% endblock %}
